<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C++ 在线极速编辑器</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --header-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #61dafb;
            --btn-bg: #3c3c3c;
            --btn-hover: #505050;
            --border-color: #444;
            --success-color: #28a745;
        }

        body.light-mode {
            --bg-color: #ffffff;
            --header-bg: #f3f3f3;
            --text-color: #333333;
            --accent-color: #007acc;
            --btn-bg: #e0e0e0;
            --btn-hover: #d0d0d0;
            --border-color: #ccc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部导航栏 */
        header {
            height: 50px;
            background-color: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .logo { font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }
        .logo span { color: var(--text-color); font-size: 0.9rem; margin-left: 5px; opacity: 0.7;}

        .actions { display: flex; gap: 8px; }

        button {
            background-color: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        button:hover { background-color: var(--btn-hover); }
        button:active { transform: scale(0.96); }

        /* 编辑器主体 */
        #editor-container {
            flex-grow: 1;
            position: relative;
        }
        #editor {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            font-size: 16px;
            line-height: 1.5;
        }

        /* 底部快捷符号栏 */
        .quick-bar {
            height: 50px;
            background-color: var(--header-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 10px;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        
        .quick-bar::-webkit-scrollbar { height: 4px; }
        .quick-bar::-webkit-scrollbar-thumb { background: #666; border-radius: 2px; }

        .symbol-btn {
            min-width: 40px;
            height: 36px;
            margin-right: 8px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1rem;
            background-color: var(--bg-color);
        }

        /* Toast 提示 */
        #toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--success-color);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* 移动端适配 */
        @media (max-width: 650px) {
            .logo span { display: none; }
            .btn-text { display: none; } /* 窄屏隐藏文字 */
            .actions { gap: 5px; }
            button { padding: 6px 10px; }
            #editor { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">C++ Editor<span>Pro</span></div>
        <div class="actions">
            <button onclick="toggleTheme()" title="切换明亮/暗黑主题">🌗</button>
            <button onclick="changeFontSize(1)" title="放大字体">A+</button>
            <button onclick="changeFontSize(-1)" title="缩小字体">A-</button>
            
            <button onclick="formatCode()" title="格式化代码 (Shift+Alt+F)">
                🧹 <span class="btn-text">格式化</span>
            </button>
            
            <button onclick="downloadCode()" title="下载 .cpp 文件">
                ⬇ <span class="btn-text">下载</span>
            </button>
            <button onclick="copyCode()" style="background-color: var(--accent-color); color: #000; font-weight: bold; border-color: var(--accent-color);">
                📋 <span class="btn-text">复制</span>
            </button>
        </div>
    </header>

    <div id="editor-container">
        <div id="editor">// 在此处开始编写你的 C++ 代码
#include <iostream>
using namespace std;

int main() {
    // 试试打乱缩进，然后点击上方的“格式化”按钮
int a=10;
      if(a>5){
cout<<"Hello World!"<<endl;
}
    return 0;
}
</div>
    </div>

    <div class="quick-bar" id="quickBar"></div>

    <div id="toast">已复制到剪贴板！</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/mode-c_cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/theme-monokai.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/theme-chrome.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ext-beautify.min.js"></script>

    <script>
        // 1. 初始化编辑器
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/c_cpp");
        
        editor.setOptions({
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true,
            fontSize: "16px",
            showPrintMargin: false,
            wrap: true,
            tabSize: 4,
            useSoftTabs: true,
            displayIndentGuides: true, // 显示缩进辅助线
            fontFamily: "Menlo, 'Ubuntu Mono', Consolas, 'Courier New', monospace" // 优化代码字体
        });

        // 2. 核心功能：代码格式化
        function formatCode() {
            // 获取 beautify 扩展
            var beautify = ace.require("ace/ext/beautify");
            if (beautify) {
                beautify.beautify(editor.session);
                showToast("代码已格式化 ✨");
            } else {
                showToast("格式化插件加载失败");
            }
        }

        // 绑定快捷键 (Shift + Alt + F)
        editor.commands.addCommand({
            name: 'formatCode',
            bindKey: {win: 'Shift-Alt-F', mac: 'Shift-Option-F'},
            exec: function(editor) {
                formatCode();
            }
        });

        // 3. 快捷符号配置
        const symbols = [
            '"', "'", ';', ':', 
            '(', ')', '{', '}', '[', ']', 
            '#', '<', '>', '=', 
            '&', '|', '!', '+', '-', '*', '/'
        ];

        const quickBar = document.getElementById('quickBar');
        symbols.forEach(char => {
            const btn = document.createElement('button');
            btn.className = 'symbol-btn';
            btn.textContent = char;
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                insertSymbol(char);
            });
            quickBar.appendChild(btn);
        });

        function insertSymbol(char) {
            editor.insert(char);
            editor.focus();
        }

        // 4. 通用工具函数
        function copyCode() {
            const code = editor.getValue();
            navigator.clipboard.writeText(code).then(() => {
                showToast("代码已复制！");
            }).catch(() => {
                showToast("复制失败，请手动复制");
            });
        }

        function downloadCode() {
            const code = editor.getValue();
            const blob = new Blob([code], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'main.cpp';
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function changeFontSize(delta) {
            let currentSize = parseInt(editor.getFontSize());
            let newSize = currentSize + delta;
            if (newSize >= 10 && newSize <= 30) {
                editor.setFontSize(newSize + "px");
            }
        }

        let isDarkMode = true;
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.classList.remove('light-mode');
                editor.setTheme("ace/theme/monokai");
            } else {
                document.body.classList.add('light-mode');
                editor.setTheme("ace/theme/chrome");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(10px)';
            }, 2000);
        }

        window.addEventListener('resize', function() {
            editor.resize();
        });
    </script>
</body>
</html>
